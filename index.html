<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catan Cheatsheet</title>
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>

  <body>
    <header>
      <div class="header-top">
        <h1>🏝️ Catan Cheatsheet</h1>
        <p class="subtitle" id="app-subtitle">
          Quick reference for cards &amp; rules
        </p>
      </div>

      <div class="header-hero">
        <div class="game-banner-wrap" id="game-banner-wrap">
          <img
            id="game-banner"
            src="src/assets/images/basic/catan.png"
            alt="Game cover"
          />
        </div>

        <div class="controls">
          <div class="control-group">
            <label for="game-select" id="label-game">Game</label>
            <div class="select-wrap">
              <select id="game-select"></select>
            </div>
          </div>
          <div class="control-group">
            <label for="lang-select" id="label-lang">Language</label>
            <div class="select-wrap">
              <select id="lang-select">
                <option value="en">🇬🇧 English</option>
                <option value="el">🇬🇷 Ελληνικά</option>
                <option value="es">🇪🇸 Español</option>
                <option value="pt">🇵🇹 Português</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="cards" id="tab-cards">
        🃏 Cards
      </button>
      <button class="tab" data-tab="gameplay" id="tab-gameplay">
        🎲 Gameplay
      </button>
    </nav>

    <main id="content">
      <div class="loading" id="loading-indicator">Loading…</div>
    </main>

    <footer>
      <p id="footer-text">
        Community reference — not affiliated with Catan Studio.
      </p>
    </footer>

    <script src="src/js/app.js"></script>
  </body>
</html>
