<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catan Cheatsheet</title>
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1>🏝️ Catan Cheatsheet</h1>
        <p class="subtitle" id="app-subtitle">Quick reference for cards &amp; rules</p>
      </div>
    </header>

    <div class="controls">
      <div class="control-group">
        <label for="game-select" id="label-game">Game</label>
        <select id="game-select"></select>
      </div>
      <div class="control-group">
        <label for="lang-select" id="label-lang">Language</label>
        <select id="lang-select">
          <option value="en">🇬🇧 English</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="es">🇪🇸 Español</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="el">🇬🇷 Ελληνικά</option>
        </select>
      </div>
    </div>

    <main id="content">
      <div class="loading" id="loading-indicator">Loading…</div>
    </main>

    <footer>
      <p id="footer-text">Community reference — not affiliated with Catan Studio.</p>
    </footer>

    <script src="src/js/app.js"></script>
  </body>
</html>
